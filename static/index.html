<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Farmer Voice Advisory</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --surface-hover: #243044;
      --accent: #22c55e;
      --accent-dim: #16a34a;
      --text: #e7edf3;
      --text-muted: #94a3b8;
      --border: #334155;
      --error: #ef4444;
      --warm: #f59e0b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }
    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }
    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.5rem;
    }
    .subtitle {
      color: var(--text-muted);
      font-size: 0.95rem;
    }
    .tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      background: var(--surface);
      padding: 0.25rem;
      border-radius: 12px;
    }
    .tab {
      flex: 1;
      padding: 0.75rem 1rem;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.2s;
    }
    .tab:hover { color: var(--text); }
    .tab.active {
      background: var(--accent);
      color: var(--bg);
    }
    .panel {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .panel.active { display: block; }
    .form-group {
      margin-bottom: 1.25rem;
    }
    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 0.4rem;
    }
    input, select {
      width: 100%;
      padding: 0.65rem 0.9rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
    }
    input:focus, select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(34, 197, 94, 0.2);
    }
    input[type="file"] {
      padding: 0.5rem;
      cursor: pointer;
    }
    .file-hint {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 0.35rem;
    }
    .btn {
      width: 100%;
      padding: 0.85rem 1.25rem;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover { background: var(--accent-dim); }
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .results {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-top: 1.5rem;
    }
    .results.visible { display: block; }
    .results h3 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
      color: var(--accent);
    }
    .summary-text {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 1rem;
      font-size: 0.95rem;
      line-height: 1.7;
    }
    .query-badge {
      display: inline-block;
      background: var(--surface-hover);
      padding: 0.25rem 0.6rem;
      border-radius: 6px;
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-right: 0.5rem;
      margin-bottom: 0.5rem;
    }
    .audio-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-top: 1rem;
    }
    audio {
      flex: 1;
      height: 40px;
    }
    .btn-download {
      padding: 0.5rem 1rem;
      background: var(--surface-hover);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      white-space: nowrap;
    }
    .btn-download:hover {
      background: var(--border);
    }
    .error {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid var(--error);
      color: #fca5a5;
      padding: 1rem;
      border-radius: 8px;
      margin-top: 1rem;
      font-size: 0.9rem;
    }
    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(0,0,0,0.2);
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 0.5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🌾 Farmer Voice Advisory</h1>
      <p class="subtitle">Hyperlocal agri news + weather — get a summary in your language as text and audio</p>
    </header>

    <div class="tabs">
      <button class="tab active" data-tab="form">Form</button>
      <button class="tab" data-tab="voice">Voice input</button>
    </div>

    <div id="panel-form" class="panel active">
      <form id="form-submit">
        <div class="form-group">
          <label for="city">City / Village *</label>
          <input type="text" id="city" name="city" placeholder="e.g. Ongole, Nashik" required>
        </div>
        <div class="form-group">
          <label for="crop">Crop *</label>
          <input type="text" id="crop" name="crop" placeholder="e.g. rice, wheat, cotton" required>
        </div>
        <div class="form-group">
          <label for="state">State (optional)</label>
          <input type="text" id="state" name="state" placeholder="e.g. Andhra Pradesh">
        </div>
        <div class="form-group">
          <label for="language">Language</label>
          <select id="language" name="language">
            <option value="en">English</option>
            <option value="te">Telugu</option>
            <option value="hi">Hindi</option>
            <option value="mr">Marathi</option>
            <option value="ta">Tamil</option>
            <option value="kn">Kannada</option>
            <option value="ml">Malayalam</option>
          </select>
        </div>
        <button type="submit" class="btn" id="btn-form">Get summary</button>
      </form>
    </div>

    <div id="panel-voice" class="panel">
      <form id="voice-submit">
        <div class="form-group">
          <label for="audio">Upload voice recording *</label>
          <input type="file" id="audio" name="audio" accept="audio/mpeg,audio/mp3,audio/wav,audio/x-wav" required>
          <p class="file-hint">MP3 or WAV. Say your city, crop, and optionally state. Example: "I am from Ongole, I grow rice."</p>
        </div>
        <div class="form-group">
          <label for="voice-language">Language hint (if not detected)</label>
          <select id="voice-language" name="language">
            <option value="en">English</option>
            <option value="te">Telugu</option>
            <option value="hi">Hindi</option>
            <option value="mr">Marathi</option>
            <option value="ta">Tamil</option>
            <option value="kn">Kannada</option>
            <option value="ml">Malayalam</option>
          </select>
        </div>
        <button type="submit" class="btn" id="btn-voice">Process voice & get summary</button>
      </form>
    </div>

    <div id="results" class="results">
      <h3>Summary</h3>
      <div id="query-badges"></div>
      <div id="summary-text" class="summary-text"></div>
      <div class="audio-row">
        <audio id="audio-player" controls></audio>
        <a id="download-link" class="btn-download" href="#" download="farmer_summary.mp3">⬇ Download MP3</a>
      </div>
    </div>

    <div id="error" class="error" style="display:none"></div>
  </div>

  <script>
    const API_BASE = window.location.origin;

    // Tabs
    document.querySelectorAll('.tab').forEach(t => {
      t.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(x => x.classList.remove('active'));
        t.classList.add('active');
        document.getElementById('panel-' + t.dataset.tab).classList.add('active');
      });
    });

    function showError(msg) {
      document.getElementById('error').textContent = msg;
      document.getElementById('error').style.display = 'block';
      document.getElementById('results').classList.remove('visible');
    }
    function hideError() {
      document.getElementById('error').style.display = 'none';
    }
    function setLoading(btn, loading) {
      btn.disabled = loading;
      btn.innerHTML = loading ? '<span class="spinner"></span>Processing…' : btn.dataset.originalText || 'Submit';
    }

    // Form submit
    const formSubmit = document.getElementById('form-submit');
    const btnForm = document.getElementById('btn-form');
    btnForm.dataset.originalText = 'Get summary';

    formSubmit.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();
      setLoading(btnForm, true);

      const body = {
        city: document.getElementById('city').value.trim(),
        crop: document.getElementById('crop').value.trim(),
        state: document.getElementById('state').value.trim() || null,
        language: document.getElementById('language').value,
        limit: 5,
      };

      try {
        const res = await fetch(API_BASE + '/api/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || res.statusText);
        showResults(data);
      } catch (err) {
        showError(err.message || 'Request failed');
      } finally {
        setLoading(btnForm, false);
      }
    });

    // Voice submit
    const voiceSubmit = document.getElementById('voice-submit');
    const btnVoice = document.getElementById('btn-voice');
    btnVoice.dataset.originalText = 'Process voice & get summary';

    voiceSubmit.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();
      const fileInput = document.getElementById('audio');
      if (!fileInput.files?.length) {
        showError('Please select an audio file');
        return;
      }
      setLoading(btnVoice, true);

      const formData = new FormData();
      formData.append('audio', fileInput.files[0]);
      formData.append('language', document.getElementById('voice-language').value);
      formData.append('limit', '5');

      try {
        const res = await fetch(API_BASE + '/api/submit/voice', {
          method: 'POST',
          body: formData,
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || res.statusText);
        showResults(data);
      } catch (err) {
        showError(err.message || 'Request failed');
      } finally {
        setLoading(btnVoice, false);
      }
    });

    function showResults(data) {
      hideError();
      document.getElementById('query-badges').innerHTML = data.query
        ? Object.entries(data.query).map(([k, v]) =>
            `<span class="query-badge">${k}: ${v}</span>`).join('')
        : '';
      document.getElementById('summary-text').textContent = data.summary_text || '';
      const audio = document.getElementById('audio-player');
      if (data.audio_base64) {
        audio.src = 'data:audio/mpeg;base64,' + data.audio_base64;
        document.getElementById('download-link').href = audio.src;
        document.getElementById('download-link').download = `farmer_summary_${(data.query?.city || 'summary').replace(/\s/g, '_')}.mp3`;
      }
      document.getElementById('results').classList.add('visible');
    }
  </script>
</body>
</html>
